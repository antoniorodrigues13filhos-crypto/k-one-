<script>
        // Init Lucide
        lucide.createIcons();

        // 0. Initialize Lenis for Smooth Scrolling
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)), 
            smooth: true,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        // 1. Frame Preloading Logic
        const frameCount = 128; // Atualizado para 128 frames
        const images = [];
        let loadedCount = 0;
        
        // Novo caminho apontando para o seu repositório Git (pasta img)
        const baseUrl = "img/ezgif-frame-"; 
        
        const loaderEl = document.getElementById('loader');
        const progressBar = document.getElementById('progress-bar');
        const loadingText = document.getElementById('loading-text');

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            
            // Ajustado para 3 dígitos: 001, 002... 128
            const frameNumber = i.toString().padStart(3, '0');
            img.src = `${baseUrl}${frameNumber}.jpg`;
            
            img.onload = () => {
                loadedCount++;
                const percent = Math.floor((loadedCount / frameCount) * 100);
                progressBar.style.width = `${percent}%`;
                
                if(percent < 30) loadingText.innerText = `Mapeando veículos jornalísticos ${percent}%...`;
                else if(percent < 60) loadingText.innerText = `Desenvolvendo pautas estratégicas ${percent}%...`;
                else if(percent < 90) loadingText.innerText = `Aprovando releases de imprensa ${percent}%...`;
                else loadingText.innerText = `Posicionamento de autoridade pronto ${percent}%...`;

                if (loadedCount === 1) {
                    setupCanvas();
                    drawCover(images[0]);
                }

                if (loadedCount === frameCount) {
                    setTimeout(() => {
                        loaderEl.style.opacity = '0';
                        loaderEl.style.visibility = 'hidden';
                        document.body.style.overflowY = 'auto';
                        document.body.classList.add('loaded'); // Triggers Cinematic Reveal
                    }, 600);
                }
            };
            
            img.onerror = () => { 
                console.warn(`Erro ao carregar frame: ${img.src}`);
                loadedCount++; 
            };
            images.push(img);
        }

        // 2 & 3. Canvas Setup
        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        
        function setupCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function drawCover(img) {
            if (!img || !img.complete) return;
            const canvasRatio = canvas.width / canvas.height;
            const imgRatio = img.width / img.height;
            let renderWidth, renderHeight, offsetX = 0, offsetY = 0;

            if (canvasRatio > imgRatio) {
                renderWidth = canvas.width;
                renderHeight = img.height * (canvas.width / img.width);
                offsetY = (canvas.height - renderHeight) / 2;
            } else {
                renderHeight = canvas.height;
                renderWidth = img.width * (canvas.height / img.height);
                offsetX = (canvas.width - renderWidth) / 2;
            }
            context.clearRect(0, 0, canvas.width, canvas.height);
            context.drawImage(img, offsetX, offsetY, renderWidth, renderHeight);
        }

        window.addEventListener('resize', () => {
            setupCanvas();
            const fraction = getScrollFraction();
            const frameIndex = Math.min(frameCount - 1, Math.ceil(fraction * (frameCount - 1)));
            if(images[frameIndex]) drawCover(images[frameIndex]);
        });

        function getScrollFraction() {
            const heroEl = document.getElementById("scroll-hero");
            const maxScroll = heroEl.offsetHeight - window.innerHeight;
            return Math.max(0, Math.min(1, window.scrollY / maxScroll));
        }

        // 4. Advanced Cinematic Scroll Handler
        const textGroup = document.getElementById("hero-content-group");

        window.addEventListener('scroll', () => {
            if (loadedCount === 0) return;
            const fraction = getScrollFraction();
            const frameIndex = Math.min(frameCount - 1, Math.ceil(fraction * (frameCount - 1)));
            
            requestAnimationFrame(() => {
                drawCover(images[frameIndex]);
                
                let opacity = 1, translateY = 0, scale = 1, blurAmount = 0;

                if (fraction <= 0.10) {
                    translateY = fraction * -150; 
                } else if (fraction > 0.10 && fraction < 0.35) {
                    let localFrac = (fraction - 0.10) / 0.25;
                    opacity = 1 - localFrac;
                    blurAmount = localFrac * 20;
                    translateY = (0.10 * -150) - (localFrac * 200);
                    scale = 1 + (localFrac * 0.1); 
                } else {
                    opacity = 0;
                    translateY = -400;
                    blurAmount = 20;
                }

                if(document.body.classList.contains('loaded')) {
                    textGroup.style.opacity = opacity;
                    textGroup.style.filter = `blur(${blurAmount}px)`;
                    textGroup.style.transform = `translateY(${translateY}px) scale(${scale})`;
                }
            });
        }, { passive: true });
    </script>
