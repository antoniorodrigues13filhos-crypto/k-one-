<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-ONE | Assessoria de Imprensa Estratégica</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-brand-black: #0F1419;
            --color-brand-dark: #1C2328;
            --color-brand-light-gray: #A7ADB2;
            --color-brand-orange: #FF5A1F;
            --color-brand-orange-dark: #e04e1b;
            --color-brand-gold: #D4C06A;
            
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Cormorant Garamond', serif;
        }

        body {
            background-color: var(--color-brand-black);
            color: #FFFFFF;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        .reveal { opacity: 0; transform: translateY(40px); filter: blur(8px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); filter: blur(0); }
        
        .editorial-border-b { border-bottom: 1px solid rgba(212, 192, 106, 0.15); }

        .glass-card { background: var(--color-brand-dark); border: 1px solid rgba(212, 192, 106, 0.1); }
        .glow-cta { box-shadow: 0 0 0 rgba(255, 90, 31, 0); transition: all 0.4s ease; }
        .glow-cta:hover { box-shadow: 0 8px 25px rgba(255, 90, 31, 0.4); transform: scale(1.02); }

        ::selection { background: var(--color-brand-orange); color: white; }
    </style>
</head>
<body class="antialiased font-sans text-white bg-brand-black overflow-x-hidden">

    <div class="noise-overlay"></div>

    <div id="loader" style="position:fixed;inset:0;background:var(--color-brand-black);z-index:9999;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:opacity 0.8s ease-out,visibility 0.8s;">
        <img src="logo sem fundo/WhatsApp_Image_2026-04-20_at_11.52.03-removebg-preview.png" alt="K-ONE Logo" class="w-48 mb-8 contrast-110 drop-shadow-[0_0_20px_rgba(212,192,106,0.15)] animate-pulse">
        <div style="width:16rem;height:1px;background:rgba(212,192,106,0.2);"><div id="progress-bar" style="height:100%;background:var(--color-brand-orange);width:0%;"></div></div>
    </div>

    <nav class="fixed top-0 left-0 w-full z-50 editorial-border-b bg-brand-black/95 backdrop-blur-xl">
        <div class="max-w-7xl mx-auto px-4 md:px-6 h-20 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <img src="logo sem fundo/WhatsApp_Image_2026-04-20_at_11.52.03-removebg-preview.png" alt="K-ONE Logo" class="h-10 w-auto">
            </div>
            
            <div class="hidden md:flex items-center gap-8 text-xs font-semibold tracking-widest uppercase text-brand-light-gray font-sans">
                <a href="#plataforma" class="hover:text-brand-gold">A Solução</a>
                <a href="#servicos" class="hover:text-brand-gold">Estratégia</a>
                <a href="#sobre" class="hover:text-brand-gold">Especialista</a>
            </div>
            
            <a href="#contato" class="glow-cta px-6 py-2.5 bg-brand-orange text-white text-[10px] uppercase font-bold tracking-widest">Agendar</a>
        </div>
    </nav>

    <section id="scroll-hero" style="height:400vh;position:relative;">
        <div style="position:sticky;top:0;height:100dvh;width:100%;overflow:hidden;">
            <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;"></canvas>
            <div style="position:absolute;inset:0;background:linear-gradient(to top, #0F1419 5%, rgba(15,20,25,0.85) 50%, rgba(15,20,25,0.4) 100%);z-index:1;"></div>
            
            <div id="hero-content-group" style="position:absolute;inset:0;z-index:2;">
                <div id="step-1" class="scroll-step absolute inset-0 flex flex-col justify-center items-center px-6">
                    <h1 class="text-5xl md:text-8xl font-serif text-white text-center leading-[1.05]">
                        Atenção não se compra. <br>
                        <span class="italic text-brand-light-gray font-light">Se conquista na</span>
                        <span class="text-white font-bold relative">Mídia.<span class="absolute bottom-2 left-0 w-full h-3 bg-brand-orange -z-10"></span></span>
                    </h1>
                </div>

                <div id="step-3" class="scroll-step absolute inset-0 flex flex-col items-center justify-center px-4 w-full max-w-4xl mx-auto opacity-0 pointer-events-none">
                    <div class="w-14 h-14 bg-brand-black border border-brand-gold rounded-full flex items-center justify-center mb-8"><i data-lucide="award" class="w-6 h-6 text-brand-gold"></i></div>
                    <h2 class="text-5xl md:text-7xl font-serif text-white mb-2">Autoridade não se<br/>compra.</h2>
                    <h3 class="text-5xl md:text-7xl font-serif text-brand-orange italic font-bold mb-8">Se constrói.</h3>
                    <p class="text-lg text-brand-light-gray mb-10">Da estratégia à exposição, posicionamos sua marca nos lugares que realmente importam.</p>
                    <a href="#contato" class="glow-cta px-10 py-4 bg-brand-orange text-white font-bold uppercase tracking-widest text-xs">Agendar Reunião</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Inicialização básica (Lucide + Canvas Engine como já configurado anteriormente)
        function initLucide(){ if(window.lucide){ lucide.createIcons(); } else { setTimeout(initLucide, 50); } }
        initLucide();
        // ... (resto do seu script JS anterior para o scroll)
    </script>
</body>
</html>
