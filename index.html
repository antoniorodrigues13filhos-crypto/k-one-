<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-ONE | Assessoria de Imprensa Estratégica</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/lucide@latest"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-brand-black: #0F1419;
            --color-brand-dark: #1C2328;
            --color-brand-light-gray: #A7ADB2;
            --color-brand-orange: #FF5A1F;
            --color-brand-orange-dark: #e04e1b;
            --color-brand-gold: #D4C06A;
            
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Cormorant Garamond', serif;
        }

        body {
            background-color: var(--color-brand-black);
            color: #FFFFFF;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05;
            pointer-events: none;
            z-index: 9999;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            filter: blur(8px);
            transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .reveal.active {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
        }
        
        .delay-100 { transition-delay: 100ms; }
        .delay-200 { transition-delay: 200ms; }
        .delay-300 { transition-delay: 300ms; }
        .delay-400 { transition-delay: 400ms; }

        #hero-canvas { will-change: transform; transform: translateZ(0); transform-origin: center center; }
        .scroll-step { will-change: transform, opacity, filter; transform: translateZ(0); }

        .editorial-border { border: 1px solid rgba(212, 192, 106, 0.15); }
        .editorial-border-b { border-bottom: 1px solid rgba(212, 192, 106, 0.15); }
        .editorial-border-t { border-top: 1px solid rgba(212, 192, 106, 0.15); }

        .reveal-element { opacity: 0; filter: blur(12px); transform: translateY(30px) scale(0.95); }
        body.loaded .reveal-element { animation: cinematicReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes cinematicReveal { to { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); } }

        .delay-1 { animation-delay: 0.1s; }
        .delay-2 { animation-delay: 0.3s; }
        .delay-3 { animation-delay: 0.5s; }
        .delay-4 { animation-delay: 0.7s; }

        .glass-card {
            background: var(--color-brand-dark);
            border: 1px solid rgba(212, 192, 106, 0.1);
            transition: all 0.4s ease;
        }
        .glass-card:hover {
            border-color: rgba(255, 90, 31, 0.5);
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .glow-cta {
            box-shadow: 0 0 0 rgba(255, 90, 31, 0);
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .glow-cta:hover {
            box-shadow: 0 8px 25px rgba(255, 90, 31, 0.4);
            transform: scale(1.02);
        }

        body.menu-open { overflow: hidden; }
        ::selection { background: var(--color-brand-orange); color: white; }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--color-brand-gold); border-radius: 4px; opacity: 0.5; }

        .typing-indicator span {
            display: inline-block;
            width: 5px; height: 5px;
            background-color: var(--color-brand-light-gray);
            border-radius: 50%; margin: 0 2px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        #chat-window {
            transform: translateY(100%);
            opacity: 0;
            pointer-events: none;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.3s ease;
        }
        @media (min-width: 768px) {
            #chat-window {
                transform: translateY(2rem) scale(0.95);
            }
        }
        #chat-window.chat-open {
            transform: translateY(0) scale(1);
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body class="antialiased font-sans text-white bg-brand-black overflow-x-hidden cursor-auto md:cursor-none">

    <div class="noise-overlay"></div>

    <div id="cursor-follower" class="hidden md:flex fixed top-0 left-0 w-8 h-8 pointer-events-none z-[9998] items-center justify-center mix-blend-screen" style="opacity: 0; will-change: transform;">
        <div id="cursor-dot" class="w-1.5 h-1.5 bg-brand-orange rounded-full shadow-[0_0_15px_rgba(255,90,31,0.9)] transition-all duration-300 ease-out"></div>
    </div>

    <script>
        // --- Motor Custom Cursor e Linha Minimalista (Desktop) ---
        const follower = document.getElementById('cursor-follower');
        const dot = document.getElementById('cursor-dot');
        const trailLine = document.createElement('div');
        trailLine.className = 'hidden md:block fixed top-0 left-0 h-[1px] bg-brand-gold/20 pointer-events-none z-[9997]';
        document.body.appendChild(trailLine);

        let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
        let followerX = mouseX, followerY = mouseY;
        let lineX = mouseX, lineY = mouseY;

        if (window.matchMedia("(pointer: fine)").matches) {
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX;
                mouseY = e.clientY;
                if (follower.style.opacity === '0') follower.style.opacity = '1';
            });

            // Efeito Hover
            document.querySelectorAll('a, button, input').forEach(el => {
                el.addEventListener('mouseenter', () => {
                    dot.classList.remove('w-1.5', 'h-1.5', 'bg-brand-orange');
                    dot.classList.add('w-10', 'h-10', 'bg-brand-gold/20', 'border', 'border-brand-gold/40', 'backdrop-blur-[2px]');
                });
                el.addEventListener('mouseleave', () => {
                    dot.classList.add('w-1.5', 'h-1.5', 'bg-brand-orange');
                    dot.classList.remove('w-10', 'h-10', 'bg-brand-gold/20', 'border', 'border-brand-gold/40', 'backdrop-blur-[2px]');
                });
            });

            function renderCursor() {
                // Inércia cursor
                followerX += (mouseX - followerX) * 0.15;
                followerY += (mouseY - followerY) * 0.15;
                follower.style.transform = `translate3d(${followerX - 16}px, ${followerY - 16}px, 0)`; 

                // Inércia linha minimalista
                lineX += (mouseX - lineX) * 0.1;
                lineY += (mouseY - lineY) * 0.1;
                
                // A linha conecta o centro superior ao cursor
                const dx = lineX; 
                const dy = lineY;
                const distance = Math.sqrt(dx * dx + dy * dy);
                
                trailLine.style.width = `${distance}px`;
                trailLine.style.transformOrigin = 'left center';
                trailLine.style.transform = `rotate(${Math.atan2(dy, dx)}rad)`;

                requestAnimationFrame(renderCursor);
            }
            requestAnimationFrame(renderCursor);
        }

        // ... resto dos seus scripts (loader, chat, scroll, etc) ...
    </script>
</body>
</html>
