<!DOCTYPE html>
<html lang="pt-BR" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>K-ONE | Assessoria de Imprensa Estratégica</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --color-brand-black: #0F1419;
            --color-brand-dark: #1C2328;
            --color-brand-light-gray: #A7ADB2;
            --color-brand-orange: #FF5A1F;
            --color-brand-orange-dark: #e04e1b;
            --color-brand-gold: #D4C06A;
            --font-sans: 'Inter', sans-serif;
            --font-serif: 'Cormorant Garamond', serif;
        }

        body {
            background-color: var(--color-brand-black);
            color: #FFFFFF;
            font-family: var(--font-sans);
            -webkit-font-smoothing: antialiased;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none; z-index: 9999;
        }

        .reveal { opacity: 0; transform: translateY(40px); filter: blur(8px); transition: all 1.2s cubic-bezier(0.16, 1, 0.3, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); filter: blur(0); }
        
        #hero-canvas { will-change: transform; transform: translateZ(0); }
        .scroll-step { will-change: transform, opacity, filter; transform: translateZ(0); }

        .editorial-border-b { border-bottom: 1px solid rgba(212, 192, 106, 0.15); }

        .reveal-element { opacity: 0; filter: blur(12px); transform: translateY(30px) scale(0.95); }
        body.loaded .reveal-element { animation: cinematicReveal 1.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes cinematicReveal { to { opacity: 1; filter: blur(0); transform: translateY(0) scale(1); } }

        .glass-card { background: var(--color-brand-dark); border: 1px solid rgba(212, 192, 106, 0.1); transition: all 0.4s ease; }
        .glass-card:hover { border-color: rgba(255, 90, 31, 0.5); transform: translateY(-5px); }

        .glow-cta { transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .glow-cta:hover { box-shadow: 0 8px 25px rgba(255, 90, 31, 0.4); transform: scale(1.02); }

        body.menu-open { overflow: hidden; }

        .chat-scroll::-webkit-scrollbar { width: 4px; }
        .chat-scroll::-webkit-scrollbar-thumb { background: var(--color-brand-gold); border-radius: 4px; }

        .typing-indicator span { display: inline-block; width: 5px; height: 5px; background-color: var(--color-brand-light-gray); border-radius: 50%; margin: 0 2px; animation: bounce 1.4s infinite ease-in-out both; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

        #chat-window { transform: translateY(100%); opacity: 0; pointer-events: none; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        #chat-window.chat-open { transform: translateY(0); opacity: 1; pointer-events: auto; }
        @media (min-width: 768px) { #chat-window { width: 380px; height: 520px; bottom: 110px; right: 40px; } }
    </style>
</head>
<body class="antialiased font-sans text-white bg-brand-black overflow-x-hidden md:cursor-none">

    <div class="noise-overlay"></div>

    <div id="cursor-follower" class="hidden md:flex fixed top-0 left-0 w-8 h-8 pointer-events-none z-[9998] items-center justify-center mix-blend-screen opacity-0 transition-opacity duration-300">
        <div id="cursor-dot" class="w-1.5 h-1.5 bg-brand-orange rounded-full shadow-[0_0_15px_rgba(255,90,31,0.9)]"></div>
    </div>
    <div id="trail-line" class="hidden md:block fixed top-0 left-0 h-[1px] bg-brand-gold/20 pointer-events-none z-[9997] origin-left"></div>

    <div id="loader" class="fixed inset-0 bg-brand-black z-[9999] flex flex-col justify-center items-center transition-all duration-800">
        <div class="mb-6 relative">
            <div class="absolute -inset-4 border border-brand-gold/30 rotate-45 animate-pulse"></div>
            <img src="logo sem fundo/WhatsApp_Image_2026-04-20_at_11.52.03-removebg-preview.png" alt="K-ONE Logo" class="h-24 w-auto relative z-10 object-contain">
        </div>
        <div class="w-64 h-[1px] bg-white/10 overflow-hidden">
            <div id="progress-bar" class="h-full bg-brand-orange w-0 transition-all duration-200"></div>
        </div>
        <p id="loading-text" class="text-brand-light-gray mt-4 text-[10px] tracking-widest uppercase font-bold">Articulando mídia 0%...</p>
    </div>

    <nav id="main-nav" class="fixed top-0 left-0 w-full z-50 editorial-border-b bg-brand-black/95 backdrop-blur-xl transition-transform duration-300">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <img src="logo sem fundo/WhatsApp_Image_2026-04-20_at_11.52.03-removebg-preview.png" class="h-16 md:h-20 w-auto object-contain">
            <div class="hidden md:flex items-center gap-8 text-[10px] font-bold tracking-widest uppercase text-brand-light-gray">
                <a href="#plataforma" class="hover:text-brand-gold transition-colors">A Solução</a>
                <a href="#servicos" class="hover:text-brand-gold transition-colors">Estratégia</a>
                <a href="#sobre" class="hover:text-brand-gold transition-colors">Especialista</a>
            </div>
            <a href="#contato" class="glow-cta px-6 py-3 bg-brand-orange text-white text-[10px] font-bold tracking-widest uppercase rounded-sm">Fale com o Time</a>
        </div>
    </nav>

    <section id="scroll-hero" class="relative" style="height: 400vh;">
        <div class="sticky top-0 h-screen w-full overflow-hidden">
            <canvas id="hero-canvas" class="absolute inset-0 w-full h-full object-cover"></canvas>
            <div class="absolute inset-0 bg-gradient-to-t from-brand-black via-brand-black/40 to-transparent z-10"></div>
            
            <div id="hero-content-group" class="relative z-20 h-full flex flex-col justify-center items-center px-6">
                <div id="step-1" class="scroll-step flex flex-col items-center text-center max-w-4xl">
                    <span class="text-brand-gold uppercase tracking-[0.3em] text-xs font-bold mb-4">Editorial de Autoridade</span>
                    <h1 class="text-5xl md:text-8xl font-serif leading-tight mb-6">
                        Atenção não se compra. <br>
                        <span class="italic text-brand-light-gray">Se conquista na</span> <span class="relative">Mídia.<span class="absolute bottom-2 left-0 w-full h-2 bg-brand-orange/40 -z-10"></span></span>
                    </h1>
                    <p class="text-brand-light-gray text-lg md:text-xl font-light max-w-2xl">Assessoria estratégica para líderes que desejam dominar o mercado sem depender apenas de anúncios.</p>
                </div>
            </div>
        </div>
    </section>

    <button id="chat-toggle-btn" class="fixed bottom-6 right-6 z-[90] transition-transform hover:scale-110">
        <img src="midia w/3d-icon-social-media-app.png" class="w-14 h-14 md:w-16 md:h-16 drop-shadow-xl">
    </button>

    <div id="chat-window" class="fixed inset-0 md:inset-auto z-[9999] bg-brand-dark/95 backdrop-blur-2xl border border-brand-gold/20 flex flex-col rounded-t-2xl md:rounded-2xl shadow-2xl overflow-hidden">
        <div class="p-4 bg-brand-black/50 border-b border-brand-gold/10 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full border-2 border-brand-orange overflow-hidden">
                    <img src="assetschat/camila.jpg.jpg" class="w-full h-full object-cover">
                </div>
                <div>
                    <h4 class="text-sm font-bold text-white leading-none">Camila</h4>
                    <span class="text-[9px] text-brand-light-gray uppercase tracking-widest">Online agora</span>
                </div>
            </div>
            <button id="close-chat-btn" class="text-brand-light-gray hover:text-white p-2">
                <i data-lucide="x" class="w-5 h-5"></i>
            </button>
        </div>
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto chat-scroll flex flex-col gap-4 text-sm"></div>
        <form id="chat-form" class="p-4 bg-brand-black/50 border-t border-brand-gold/10 flex gap-2">
            <input type="text" id="chat-input" placeholder="Digite sua dúvida..." class="flex-1 bg-brand-dark border border-brand-gold/20 rounded-full px-4 py-2 text-sm focus:outline-none focus:border-brand-orange">
            <button type="submit" class="w-10 h-10 bg-brand-orange rounded-full flex items-center justify-center"><i data-lucide="send" class="w-4 h-4 text-white"></i></button>
        </form>
    </div>

    <script>
        // --- Inicialização de Ícones e Interface ---
        document.addEventListener('DOMContentLoaded', () => {
            if(window.lucide) lucide.createIcons();
            
            // --- Lógica do Cursor e Linha Minimalista (Desktop) ---
            const follower = document.getElementById('cursor-follower');
            const trailLine = document.getElementById('trail-line');
            let mX = 0, mY = 0, fX = 0, fY = 0, lX = 0, lY = 0;

            if (window.matchMedia("(pointer: fine)").matches) {
                window.addEventListener('mousemove', (e) => {
                    mX = e.clientX; mY = e.clientY;
                    follower.style.opacity = '1';
                });

                function renderLoop() {
                    // Cursor suave
                    fX += (mX - fX) * 0.15;
                    fY += (mY - fY) * 0.15;
                    follower.style.transform = `translate3d(${fX - 16}px, ${fY - 16}px, 0)`;

                    // Linha minimalista (segue o cursor)
                    lX += (mX - lX) * 0.1;
                    lY += (mY - lY) * 0.1;
                    const dist = Math.sqrt(lX * lX + lY * lY);
                    const angle = Math.atan2(lY, lX);
                    trailLine.style.width = `${dist}px`;
                    trailLine.style.transform = `rotate(${angle}rad)`;

                    requestAnimationFrame(renderLoop);
                }
                renderLoop();
            }

            // --- Gerenciador de Scroll Video (Canvas) ---
            const canvas = document.getElementById("hero-canvas");
            const ctx = canvas.getContext("2d");
            const frameCount = 128; 
            const images = [];
            let loadedImages = 0;

            function preloadImages() {
                for (let i = 1; i <= frameCount; i++) {
                    const img = new Image();
                    img.src = `ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
                    img.onload = () => {
                        loadedImages++;
                        const progress = Math.floor((loadedImages / frameCount) * 100);
                        document.getElementById('progress-bar').style.width = `${progress}%`;
                        document.getElementById('loading-text').innerText = `Articulando mídia ${progress}%...`;
                        if (loadedImages === frameCount) startApp();
                    };
                    images.push(img);
                }
            }

            function startApp() {
                document.getElementById('loader').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('loader').style.display = 'none';
                    document.body.classList.add('loaded');
                }, 800);
                renderCanvas(0);
            }

            function renderCanvas(index) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                const img = images[index];
                if (!img) return;
                
                const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width / 2) - (img.width / 2) * scale;
                const y = (canvas.height / 2) - (img.height / 2) * scale;
                ctx.drawImage(img, x, y, img.width * scale, img.height * scale);
            }

            window.addEventListener('scroll', () => {
                const scrollTop = window.scrollY;
                const maxScroll = document.getElementById('scroll-hero').offsetHeight - window.innerHeight;
                const scrollFraction = Math.min(1, scrollTop / maxScroll);
                const frameIndex = Math.min(frameCount - 1, Math.floor(scrollFraction * frameCount));
                
                requestAnimationFrame(() => renderCanvas(frameIndex));
            });

            preloadImages();

            // --- Chat Assistente ---
            const chatToggle = document.getElementById('chat-toggle-btn');
            const chatWin = document.getElementById('chat-window');
            const chatForm = document.getElementById('chat-form');
            const chatMessages = document.getElementById('chat-messages');

            chatToggle.addEventListener('click', () => {
                chatWin.classList.toggle('chat-open');
                if(chatWin.classList.contains('chat-open') && chatMessages.children.length === 0) {
                    setTimeout(() => addMessage("Olá! Sou a Camila, da K-ONE. Como posso ajudar na sua autoridade hoje?"), 500);
                }
            });

            document.getElementById('close-chat-btn').addEventListener('click', () => chatWin.classList.remove('chat-open'));

            function addMessage(text, isUser = false) {
                const div = document.createElement('div');
                div.className = `max-w-[80%] p-3 rounded-2xl ${isUser ? 'bg-brand-orange ml-auto' : 'bg-brand-dark/50 border border-brand-gold/10'}`;
                div.innerHTML = text;
                chatMessages.appendChild(div);
                chatMessages.scrollTop = chatMessages.scrollHeight;
            }

            chatForm.addEventListener('submit', (e) => {
                e.preventDefault();
                const input = document.getElementById('chat-input');
                if(!input.value) return;
                addMessage(input.value, true);
                input.value = '';
                setTimeout(() => addMessage("Entendi. Vou te direcionar para um especialista no WhatsApp para um atendimento estratégico."), 1000);
            });
        });
    </script>
</body>
</html>
